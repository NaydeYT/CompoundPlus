<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a101f"/>
      <stop offset="0.55" stop-color="#0d1426"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glowG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6cf8bb" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6cf8bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6cf8bb"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="320" fill="url(#glowG)"/>
  <circle cx="980" cy="560" r="300" fill="url(#glowB)"/>

  <!-- marque -->
  <g transform="translate(80,70)">
    <rect width="40" height="40" rx="10" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.15"/>
    <rect x="8" y="22" width="5.5" height="11" rx="1.5" fill="#ffffff"/>
    <rect x="17" y="16" width="5.5" height="17" rx="1.5" fill="#ffffff"/>
    <rect x="26" y="8" width="5.5" height="25" rx="1.5" fill="#6cf8bb"/>
    <text x="56" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#ffffff" letter-spacing="-0.5">Compound+</text>
  </g>

  <!-- titre -->
  <text x="80" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Simulez le <tspan fill="#6cf8bb">rendement</tspan></text>
  <text x="80" y="332" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="800" fill="#ffffff" letter-spacing="-1.5">de vos investissements</text>
  <text x="82" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#9ba6c0">Évaluez votre stratégie d'épargne — gratuitement, sans compte.</text>

  <!-- KPIs -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="82" y="500" font-size="40" font-weight="800" fill="#ffffff">&lt; 30 s</text>
    <text x="82" y="528" font-size="16" fill="#8a93ab">première projection</text>

    <rect x="300" y="468" width="1" height="60" fill="#ffffff" opacity="0.16"/>
    <text x="332" y="500" font-size="40" font-weight="800" fill="#ffffff">40 ans</text>
    <text x="332" y="528" font-size="16" fill="#8a93ab">horizon, inflation &amp; frais</text>

    <rect x="620" y="468" width="1" height="60" fill="#ffffff" opacity="0.16"/>
    <text x="652" y="500" font-size="40" font-weight="800" fill="#6cf8bb">0 €</text>
    <text x="652" y="528" font-size="16" fill="#8a93ab">de frais, sans compte</text>
  </g>

  <!-- motif graphique -->
  <g transform="translate(822,158)">
    <rect width="300" height="300" rx="24" fill="#0f172a" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="40" y="200" width="28" height="60" rx="5" fill="#94a3b8"/>
    <rect x="86" y="168" width="28" height="92" rx="5" fill="#94a3b8"/>
    <rect x="132" y="128" width="28" height="132" rx="5" fill="#cbd5e1"/>
    <rect x="178" y="92" width="28" height="168" rx="5" fill="#cbd5e1"/>
    <rect x="224" y="56" width="28" height="204" rx="5" fill="url(#bar)"/>
    <path d="M54 180 L100 150 L146 116 L192 84 L238 48" fill="none" stroke="#6cf8bb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="238" cy="48" r="7" fill="#6cf8bb"/>
  </g>
</svg>
